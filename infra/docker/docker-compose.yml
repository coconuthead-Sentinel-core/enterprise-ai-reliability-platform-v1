# infra/docker - local dev stack (api + web + postgres + redis)
# Run from the repo root:
#   docker compose -f infra/docker/docker-compose.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: earp
      POSTGRES_PASSWORD: earp_dev
      POSTGRES_DB: earp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earp -d earp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../../enterprise_ai_backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://earp:earp_dev@postgres:5432/earp
      JWT_SECRET: dev-only-change-me-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_MINUTES: "60"
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  pgdata:
