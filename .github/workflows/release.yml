name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      env:
        description: "Deploy environment"
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  id-token: write      # OIDC login to Azure
  contents: read
  packages: write      # push to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/api
  IMAGE_WEB: ${{ github.repository }}/web
  AZURE_REGION: centralus

jobs:
  check-azure-credentials:
    name: Check Azure deployment prerequisites
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev' }}
    outputs:
      azure_ready: ${{ steps.check.outputs.azure_ready }}
    steps:
      - name: Determine whether Azure credentials are configured
        id: check
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_MANAGED_IDENTITY_ID: ${{ secrets.AZURE_MANAGED_IDENTITY_ID }}
          AZURE_KEY_VAULT_URI: ${{ secrets.AZURE_KEY_VAULT_URI }}
        run: |
          missing=()
          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID AZURE_MANAGED_IDENTITY_ID AZURE_KEY_VAULT_URI; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "azure_ready=true" >> "$GITHUB_OUTPUT"
            {
              echo "Azure deployment prerequisites"
              echo
              echo "All required Azure deployment secrets are configured for this environment."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "azure_ready=false" >> "$GITHUB_OUTPUT"
            {
              echo "Azure deployment skipped"
              echo
              echo "The workflow will still publish GHCR images. Azure deployment is treated as an external follow-on when these secrets are absent:"
              for name in "${missing[@]}"; do
                echo "- $name"
              done
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      registry_repo: ${{ steps.meta.outputs.registry_repo }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi
          echo "registry_repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: enterprise_ai_backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.registry_repo }}/api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.registry_repo }}/api:latest

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.registry_repo }}/web:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.registry_repo }}/web:latest

  deploy:
    name: Deploy to Azure Container Apps
    if: needs.check-azure-credentials.outputs.azure_ready == 'true'
    needs: [check-azure-credentials, build-and-push]
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-earp-${{ inputs.env || 'dev' }}-${{ env.AZURE_REGION }}
          template: infra/bicep/main.bicep
          parameters: >-
            infra/bicep/main.parameters.${{ inputs.env || 'dev' }}.json
            region=${{ env.AZURE_REGION }}
            registryRepo=${{ needs.build-and-push.outputs.registry_repo }}
            managedIdentityId=${{ secrets.AZURE_MANAGED_IDENTITY_ID }}
            keyVaultUri=${{ secrets.AZURE_KEY_VAULT_URI }}
            apiImageTag=${{ needs.build-and-push.outputs.image_tag }}
            webImageTag=${{ needs.build-and-push.outputs.image_tag }}
