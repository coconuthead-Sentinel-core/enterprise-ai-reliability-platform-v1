name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      env:
        description: "Deploy environment"
        required: true
        type: choice
        options: [dev, staging, prod]
        default: dev

permissions:
  id-token: write      # OIDC login to Azure
  contents: read
  packages: write      # push to ghcr.io

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/api
  IMAGE_WEB: ${{ github.repository }}/web
  AZURE_REGION: centralus

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: enterprise_ai_backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}:latest

  deploy:
    name: Deploy to Azure Container Apps
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: rg-earp-${{ inputs.env || 'dev' }}-${{ env.AZURE_REGION }}
          template: infra/bicep/main.bicep
          parameters: >-
            infra/bicep/main.parameters.${{ inputs.env || 'dev' }}.json
            region=${{ env.AZURE_REGION }}
            registryRepo=${{ github.repository }}
            managedIdentityId=${{ secrets.AZURE_MANAGED_IDENTITY_ID }}
            keyVaultUri=${{ secrets.AZURE_KEY_VAULT_URI }}
            apiImageTag=${{ needs.build-and-push.outputs.image_tag }}
            webImageTag=${{ needs.build-and-push.outputs.image_tag }}
