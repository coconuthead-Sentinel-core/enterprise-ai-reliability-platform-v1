name: Feature request
description: Propose a new capability or enhancement
labels: ["enhancement", "triage"]
body:
  - type: input
    id: component
    attributes:
      label: Component
      description: e.g. `apps/api`, `apps/web`, `libs/policy`, `infra`
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who hits it?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is done?
      value: |
        - [ ]
        - [ ]
        - [ ]

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 - critical / blocking
        - P2 - high value
        - P3 - nice to have
    validations:
      required: true
