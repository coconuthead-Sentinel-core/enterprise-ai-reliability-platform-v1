name: Bug report
description: Something isn't working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please give us enough detail to reproduce.

  - type: input
    id: component
    attributes:
      label: Component
      description: e.g. `apps/api`, `apps/web`, `libs/policy`, `infra/bicep`
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. curl http://localhost:8000/...
        2. observe 500 error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / commit SHA
      placeholder: v0.3.0 or git short SHA

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P1 - production outage / data loss
        - P2 - major feature broken
        - P3 - minor bug / cosmetic
    validations:
      required: true
